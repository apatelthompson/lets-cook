name: cron — hourly drip tick

# Hits the deployed /api/cron endpoint every hour. Each tick, the app looks
# for subscribers whose local hour == 10 and sends them their next message.
#
# Why GitHub Actions instead of Vercel Cron: Vercel's Hobby (free) plan only
# allows cron jobs to run once per day, but this program needs hourly ticks
# to support per-recipient timezones (e.g. 10am EST fires at a different
# UTC hour than 10am PST). GitHub Actions scheduled workflows are free,
# unlimited, and handle this cleanly.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   VERCEL_APP_URL  – e.g. https://lets-cook-xyz.vercel.app (no trailing slash)
#   CRON_SECRET     – must match the same env var in Vercel
on:
  schedule:
    # minute=0, every hour
    - cron: "0 * * * *"
  # Allow manual triggering from the Actions UI for debugging
  workflow_dispatch:

concurrency:
  group: cron
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$VERCEL_APP_URL" ]; then
            echo "::error::VERCEL_APP_URL repo secret is not set"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set"
            exit 1
          fi

          # Strip any accidental trailing slash so we don't end up with //api/cron
          URL="${VERCEL_APP_URL%/}/api/cron"
          echo "Requesting: $URL"

          # Run curl without -e so a network failure still lets us print diagnostics.
          # -w writes the HTTP status + a few timing/redirect fields on stdout so we
          # can tell the difference between "DNS failed" and "server returned 500".
          set +e
          http_code=$(curl -sS -o /tmp/body.txt \
            -w "%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL" 2> /tmp/curl.err)
          curl_exit=$?
          set -e

          echo "curl exit: $curl_exit"
          echo "HTTP status: ${http_code:-<none>}"
          if [ -s /tmp/curl.err ]; then
            echo "curl stderr:"
            sed 's/^/  /' /tmp/curl.err
          fi
          echo "Response body:"
          if [ -s /tmp/body.txt ]; then
            sed 's/^/  /' /tmp/body.txt
          else
            echo "  <empty>"
          fi
          echo

          if [ "$curl_exit" != "0" ]; then
            echo "::error::curl failed (exit $curl_exit) — check VERCEL_APP_URL secret + that the deployment is reachable"
            exit 1
          fi
          if [ "$http_code" = "401" ]; then
            echo "::error::/api/cron returned 401 — CRON_SECRET in GitHub repo secrets doesn't match the one in Vercel env vars"
            exit 1
          fi
          if [ "$http_code" != "200" ]; then
            echo "::error::/api/cron returned HTTP $http_code — see response body above for details"
            exit 1
          fi
